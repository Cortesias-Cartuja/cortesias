<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Gestión de Flota</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="form-container">
    <div class="header-nav no-print">
      <a href="index.html" class="btn-admin">⬅️ VOLVER AL PANEL</a>
      <h2>GESTIÓN DE VEHÍCULOS</h2>
    </div>

    <div class="sub-section">
      <h4 id="form-title">AÑADIR NUEVO VEHÍCULO</h4>
      <input type="hidden" id="edit-id">
      <div class="grid-3">
        <div><label>Matrícula</label><input id="adm-mat"></div>
        <div><label>Modelo</label><input id="adm-mod"></div>
        <div><label>KMs Actuales</label><input id="adm-kms" type="number"></div>
      </div>
      <div class="grid-3">
        <div><label>Compañía Seguro</label><input id="adm-cia"></div>
        <div><label>Nº Póliza</label><input id="adm-pol"></div>
        <div><label>Tel. Asistencia</label><input id="adm-tel"></div>
      </div>
      <button class="btn-main" id="btn-guardar" onclick="guardarCoche()">💾 GUARDAR VEHÍCULO</button>
      <button class="btn-main" id="btn-cancelar" style="display:none; background:#666;" onclick="cancelarEdicion()">CANCELAR</button>
    </div>

    <div class="section" style="margin-top:20px;">
      <h3>LISTADO DE FLOTA</h3>
      <table id="tabla-coches" style="width:100%; font-size:12px; border-collapse: collapse;">
        <thead>
          <tr style="background:#eee;">
            <th>Matrícula</th>
            <th>Modelo</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="lista-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeejUNvRX3KvmHMgKUff5vTS44-_UGCSg",
      authDomain: "cortesias-4235e.firebaseapp.com",
      databaseURL: "https://cortesias-4235e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "cortesias-4235e",
      storageBucket: "cortesias-4235e.firebasestorage.app",
      messagingSenderId: "45340224860",
      appId: "1:45340224860:web:69c15fc56fc5a04ab76599"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function guardarCoche() {
      const id = document.getElementById('edit-id').value;
      const coche = {
        matricula: document.getElementById('adm-mat').value,
        modelo: document.getElementById('adm-mod').value,
        kms: document.getElementById('adm-kms').value,
        seguroCia: document.getElementById('adm-cia').value,
        seguroPoliza: document.getElementById('adm-pol').value,
        seguroTel: document.getElementById('adm-tel').value,
        estado: "Disponible"
      };

      if (id) {
        db.ref('coches/' + id).update(coche).then(limpiar);
      } else {
        db.ref('coches').push(coche).then(limpiar);
      }
    }

    db.ref('coches').on('value', snap => {
      const body = document.getElementById('lista-body');
      body.innerHTML = "";
      snap.forEach(child => {
        const c = child.val();
        body.innerHTML += `
          <tr style="border-bottom:1px solid #ddd;">
            <td>${c.matricula}</td>
            <td>${c.modelo}</td>
            <td><strong>${c.estado}</strong></td>
            <td>
              <button onclick="editarCoche('${child.key}')">✏️</button>
              <button onclick="eliminarCoche('${child.key}')">🗑️</button>
            </td>
          </tr>`;
      });
    });

    function editarCoche(id) {
      db.ref('coches/' + id).once('value', snap => {
        const c = snap.val();
        document.getElementById('edit-id').value = id;
        document.getElementById('adm-mat').value = c.matricula;
        document.getElementById('adm-mod').value = c.modelo;
        document.getElementById('adm-kms').value = c.kms;
        document.getElementById('adm-cia').value = c.seguroCia || "";
        document.getElementById('adm-pol').value = c.seguroPoliza || "";
        document.getElementById('adm-tel').value = c.seguroTel || "";
        document.getElementById('form-title').innerText = "EDITANDO VEHÍCULO";
        document.getElementById('btn-cancelar').style.display = "inline-block";
      });
    }

    function eliminarCoche(id) { if(confirm("¿Eliminar coche?")) db.ref('coches/' + id).remove(); }
    function limpiar() { location.reload(); }
    function cancelarEdicion() { location.reload(); }
  </script>
</body>
</html>
