<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Control de Flota Pro</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
    /* Tarjetas ahora clicables */
    .dash-card { 
        background: white; padding: 15px; border-radius: 10px; text-align: center; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 5px solid #1e3a8a; 
        cursor: pointer; transition: transform 0.2s;
    }
    .dash-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .dash-card h2 { margin: 5px 0; font-size: 28px; color: #1e3a8a; }
    .dash-card label { font-size: 12px; color: #64748b; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    
    .status-pill { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; color: white; }
    .bg-disponible { background: #10b981; }
    .bg-prestado { background: #f59e0b; }
    .bg-baja { background: #ef4444; }

    .filtro-activo { border: 2px solid #1e3a8a !important; background: #eff6ff !important; }
    #admin-content { display: none; }
  </style>
</head>
<body style="background:#f1f5f9;">

  <script>
    const passB64 = "c2tvZGF0YWxsZXI=";
    const promptPass = prompt("Contraseña:");
    if (btoa(promptPass) === passB64) {
        document.addEventListener("DOMContentLoaded", () => document.getElementById('admin-content').style.display='block');
    } else { window.location.href = "index.html"; }
  </script>

  <div id="admin-content" class="form-container" style="max-width: 1100px;">
    <div class="header-nav no-print">
      <a href="index.html" class="btn-admin">⬅️ PANEL DE FIRMAS</a>
      <h2 style="color:#1e3a8a;">SISTEMA DE GESTIÓN SKODA</h2>
      <button onclick="exportarExcel()" style="background:#10b981; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">📥 EXCEL COMPLETO</button>
    </div>

    <div class="dashboard">
        <div class="dash-card" id="card-all" onclick="filtrarLista('Todos')">
            <label>Total Flota</label><h2 id="count-total">0</h2>
        </div>
        <div class="dash-card" id="card-dispo" style="border-color:#10b981;" onclick="filtrarLista('Disponible')">
            <label>Disponibles</label><h2 id="count-dispo" style="color:#10b981;">0</h2>
        </div>
        <div class="dash-card" id="card-pres" style="border-color:#f59e0b;" onclick="filtrarLista('Prestado')">
            <label>Prestados</label><h2 id="count-pres" style="color:#f59e0b;">0</h2>
        </div>
        <div class="dash-card" id="card-baja" style="border-color:#ef4444;" onclick="filtrarLista('Baja')">
            <label>En Baja</label><h2 id="count-baja" style="color:#ef4444;">0</h2>
        </div>
    </div>

    <div class="sub-section" style="background:white; border: 1px solid #cbd5e1;">
      <h4 id="form-title">➕ AÑADIR / EDITAR VEHÍCULO</h4>
      <input type="hidden" id="edit-id">
      <div class="grid-4">
        <div><label>Matrícula</label><input id="adm-mat" placeholder="0000BBB"></div>
        <div><label>Modelo</label><input id="adm-mod"></div>
        <div><label>KMs Actuales</label><input id="adm-kms" type="number"></div>
        <div><label>Estado</label>
            <select id="adm-estado">
                <option value="Disponible">✅ Disponible</option>
                <option value="Prestado">🚗 Prestado</option>
                <option value="Baja">🛠️ Baja / Taller</option>
            </select>
        </div>
      </div>
      <div class="grid-3" style="margin-top:10px;">
        <div><label>Seguro</label><input id="adm-cia"></div>
        <div><label>Póliza</label><input id="adm-pol"></div>
        <div><label>Tel. Asistencia</label><input id="adm-tel"></div>
      </div>
      <div style="margin-top:10px; display:flex; gap:10px;">
        <button class="btn-main" id="btn-save" onclick="guardarCoche()" style="flex:2;">💾 GUARDAR</button>
        <button id="btn-cancel" onclick="limpiarForm()" style="display:none; flex:1;">CANCELAR</button>
      </div>
    </div>

    <div class="section" style="margin-top:20px; background:white;">
      <h3 id="titulo-lista">📋 TODOS LOS VEHÍCULOS</h3>
      <table style="width:100%; border-collapse: collapse; font-size:12px;">
        <thead>
          <tr style="background:#f8fafc; text-align:left; border-bottom:2px solid #eee;">
            <th style="padding:10px;">Vehículo</th>
            <th>Estado</th>
            <th>KMs</th>
            <th>Info Seguro</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="lista-body"></tbody>
      </table>
    </div>

    <div class="grid-2-col" style="margin-top:20px;">
        <div class="sub-section" style="background:white;">
            <h4>👥 ASESORES</h4>
            <div style="display:flex; gap:5px;"><input id="n-asesor"><button onclick="addAsesor()">+</button></div>
            <div id="list-asesores" style="margin-top:10px;"></div>
        </div>
        <div class="sub-section" style="background:#fef2f2; border:1px solid #fecaca; text-align:center;">
            <h4 style="color:red">LIMPIEZA</h4>
            <button onclick="borrarHistorial()" style="background:red; color:white; padding:10px; border:none; border-radius:5px; width:100%;">BORRAR SÓLO HISTORIAL DE PRUEBAS</button>
        </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeejUNvRX3KvmHMgKUff5vTS44-_UGCSg",
      authDomain: "cortesias-4235e.firebaseapp.com",
      databaseURL: "https://cortesias-4235e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "cortesias-4235e",
      storageBucket: "cortesias-4235e.firebasestorage.app",
      messagingSenderId: "45340224860",
      appId: "1:45340224860:web:69c15fc56fc5a04ab76599"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let flotaCompleta = [];
    let filtroActual = 'Todos';

    db.ref('coches').on('value', snap => {
        flotaCompleta = [];
        let t=0, d=0, p=0, b=0;
        snap.forEach(child => {
            const c = child.val(); c.id = child.key;
            flotaCompleta.push(c);
            t++;
            if(c.estado==='Disponible') d++;
            else if(c.estado==='Prestado') p++;
            else b++;
        });
        document.getElementById('count-total').innerText=t;
        document.getElementById('count-dispo').innerText=d;
        document.getElementById('count-pres').innerText=p;
        document.getElementById('count-baja').innerText=b;
        renderizarLista();
    });

    function filtrarLista(tipo) {
        filtroActual = tipo;
        // Efecto visual en las tarjetas
        document.querySelectorAll('.dash-card').forEach(c => c.classList.remove('filtro-activo'));
        if(tipo === 'Disponible') document.getElementById('card-dispo').classList.add('filtro-activo');
        if(tipo === 'Prestado') document.getElementById('card-pres').classList.add('filtro-activo');
        if(tipo === 'Baja') document.getElementById('card-baja').classList.add('filtro-activo');
        if(tipo === 'Todos') document.getElementById('card-all').classList.add('filtro-activo');
        
        document.getElementById('titulo-lista').innerText = "📋 VEHÍCULOS: " + tipo.toUpperCase();
        renderizarLista();
    }

    function renderizarLista() {
        const body = document.getElementById('lista-body');
        body.innerHTML = "";
        flotaCompleta.forEach(c => {
            if(filtroActual === 'Todos' || c.estado === filtroActual) {
                let cl = c.estado === 'Disponible' ? 'bg-disponible' : (c.estado === 'Prestado' ? 'bg-prestado' : 'bg-baja');
                body.innerHTML += `<tr>
                    <td style="padding:10px;"><strong>${c.matricula}</strong><br><small>${c.modelo}</small></td>
                    <td><span class="status-pill ${cl}">${c.estado}</span></td>
                    <td>${Number(c.kms).toLocaleString()} km</td>
                    <td>${c.seguroCia || '-'}<br><small>${c.seguroPoliza || '-'}</small></td>
                    <td>
                        <button class="btn-edit" onclick="editarCoche('${c.id}')">✏️</button>
                        <button class="btn-delete" onclick="eliminarCoche('${c.id}')">🗑️</button>
                    </td>
                </tr>`;
            }
        });
    }

    // [Resto de funciones: guardarCoche, editarCoche, eliminarCoche, exportarExcel, etc. se mantienen igual]
    function guardarCoche() {
        const id = document.getElementById('edit-id').value;
        const c = {
            matricula: document.getElementById('adm-mat').value.toUpperCase(),
            modelo: document.getElementById('adm-mod').value,
            kms: Number(document.getElementById('adm-kms').value),
            estado: document.getElementById('adm-estado').value,
            seguroCia: document.getElementById('adm-cia').value,
            seguroPoliza: document.getElementById('adm-pol').value,
            seguroTel: document.getElementById('adm-tel').value
        };
        if(id) db.ref('coches/'+id).update(c).then(limpiarForm);
        else db.ref('coches').push(c).then(limpiarForm);
    }

    function editarCoche(id) {
        const c = flotaCompleta.find(x => x.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('adm-mat').value = c.matricula;
        document.getElementById('adm-mod').value = c.modelo;
        document.getElementById('adm-kms').value = c.kms;
        document.getElementById('adm-estado').value = c.estado;
        document.getElementById('adm-cia').value = c.seguroCia || "";
        document.getElementById('adm-pol').value = c.seguroPoliza || "";
        document.getElementById('adm-tel').value = c.seguroTel || "";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function limpiarForm() { 
        document.getElementById('edit-id').value = ""; 
        document.querySelectorAll('input').forEach(i => i.value="");
        document.getElementById('btn-cancel').style.display = "none";
    }

    function eliminarCoche(id) { if(confirm("¿Borrar coche?")) db.ref('coches/'+id).remove(); }
    function addAsesor() {
        const n = document.getElementById('n-asesor').value;
        if(n) db.ref('config/asesores').push(n).then(()=>document.getElementById('n-asesor').value="");
    }
    db.ref('config/asesores').on('value', snap => {
        const d = document.getElementById('list-asesores'); d.innerHTML = "";
        snap.forEach(c => { d.innerHTML += `<span style="background:#ddd; padding:5px; margin:2px; border-radius:5px; font-size:10px;">${c.val()} <button onclick="db.ref('config/asesores/${c.key}').remove()">x</button></span>`; });
    });
    function borrarHistorial() { if(confirm("¿Borrar historial de pruebas?")) db.ref('contratos').remove(); }

    async function exportarExcel() {
        const snap = await db.ref('contratos').once('value');
        let csv = "Fecha;Matricula;Cliente;DNI;Tel;Mat. Cliente;Asesor;Dev. Prevista;Dev. Real;KMs\n";
        snap.forEach(c => {
            const d = c.val();
            csv += `${d.fechaSalida};${d.matricula};${d.nombre};${d.dni};${d.tel};${d.matCliente};${d.asesor};${d.fechaDevolucionPrevista};${d.fechaEntrada || 'Fuera'};${d.kmsEntrada ? (d.kmsEntrada-d.kms) : ''}\n`;
        });
        const blob = new Blob(["\ufeff" + csv], {type:'text/csv;charset=utf-8;'});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Historial.csv"; a.click();
    }
  </script>
</body>
</html>
