<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Control de Flota</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body style="background:#f0f2f5;">
  <div class="form-container" style="max-width:1200px;">
    <div class="header-nav">
      <a href="index.html" class="btn-admin">⬅️ VOLVER</a>
      <h2>📊 ADMINISTRACIÓN Y HISTORIAL</h2>
      <button onclick="exportarExcel()" style="background:#059669; color:white; padding:10px; border-radius:5px;">📥 EXCEL</button>
    </div>

    <div class="grid-2-col">
        <div class="sub-section" style="background:white;">
            <h4>🚗 AÑADIR/EDITAR VEHÍCULO</h4>
            <input type="hidden" id="edit-id">
            <div class="grid-2"><input id="adm-mat" placeholder="Matrícula"><input id="adm-mod" placeholder="Modelo"></div>
            <div class="grid-2"><input id="adm-kms" type="number" placeholder="KMs"><select id="adm-estado">
                <option value="Disponible">Disponible</option>
                <option value="Baja">Baja / Taller</option>
            </select></div>
            <input id="adm-cia" placeholder="Compañía Seguro">
            <input id="adm-pol" placeholder="Póliza">
            <input id="adm-tel" placeholder="Tel. Asistencia">
            <button class="btn-main" onclick="guardarCoche()">GUARDAR COCHE</button>
        </div>
        <div class="sub-section" style="background:white;">
            <h4>👥 ASESORES</h4>
            <div style="display:flex; gap:5px;"><input id="n-asesor" placeholder="Nombre Asesor"><button onclick="addAsesor()">+</button></div>
            <div id="list-asesores" style="margin-top:10px;"></div>
            <hr>
            <button onclick="borrarHistorial()" style="background:#dc2626; color:white; width:100%; padding:10px; border:none; border-radius:5px; margin-top:20px; font-weight:bold; cursor:pointer;">⚠️ BORRAR DATOS DE PRUEBA (HISTORIAL)</button>
        </div>
    </div>

    <div class="section" style="margin-top:20px;">
        <h3>🔍 HISTORIAL COMPLETO</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input id="f-mat" placeholder="Filtrar Matrícula" oninput="filtrar()">
            <input type="date" id="f-desde" onchange="filtrar()">
            <input type="date" id="f-hasta" onchange="filtrar()">
        </div>
        <table style="width:100%; background:white; font-size:11px; border-collapse:collapse;">
            <thead><tr style="background:#1e3a8a; color:white;">
                <th>Fecha Salida</th><th>Matrícula</th><th>Cliente</th><th>Asesor</th><th>KMs Recorridos</th><th>Estado</th>
            </tr></thead>
            <tbody id="historial-body"></tbody>
        </table>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAeejUNvRX3KvmHMgKUff5vTS44-_UGCSg",
      authDomain: "cortesias-4235e.firebaseapp.com",
      databaseURL: "https://cortesias-4235e-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "cortesias-4235e",
      storageBucket: "cortesias-4235e.firebasestorage.app",
      messagingSenderId: "45340224860",
      appId: "1:45340224860:web:69c15fc56fc5a04ab76599"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function guardarCoche() {
        const id = document.getElementById('edit-id').value;
        const c = {
            matricula: document.getElementById('adm-mat').value.toUpperCase(),
            modelo: document.getElementById('adm-mod').value,
            kms: document.getElementById('adm-kms').value,
            seguroCia: document.getElementById('adm-cia').value,
            seguroPoliza: document.getElementById('adm-pol').value,
            seguroTel: document.getElementById('adm-tel').value,
            estado: document.getElementById('adm-estado').value
        };
        if(id) db.ref('coches/'+id).update(c); else db.ref('coches').push(c);
        location.reload();
    }

    function addAsesor() {
        const n = document.getElementById('n-asesor').value;
        if(n) db.ref('config/asesores').push(n).then(()=>location.reload());
    }

    // FUNCIÓN PARA BORRAR SOLO LOS CONTRATOS (DATOS DE PRUEBA)
    function borrarHistorial() {
        if(confirm("¿Estás seguro? Se borrarán todos los préstamos realizados, pero NO los coches ni los asesores.")){
            db.ref('contratos').remove().then(() => {
                alert("Historial limpiado.");
                location.reload();
            });
        }
    }

    db.ref('config/asesores').on('value', snap => {
        const div = document.getElementById('list-asesores'); div.innerHTML = "";
        snap.forEach(c => {
            div.innerHTML += `<span>${c.val()} <button onclick="db.ref('config/asesores/${c.key}').remove()">x</button></span> `;
        });
    });

    let historialGlobal = [];
    db.ref('contratos').on('value', snap => {
        historialGlobal = [];
        snap.forEach(c => { historialGlobal.push(c.val()); });
        historialGlobal.reverse();
        filtrar();
    });

    function filtrar() {
        const mat = document.getElementById('f-mat').value.toUpperCase();
        const body = document.getElementById('historial-body');
        body.innerHTML = "";
        historialGlobal.forEach(c => {
            if(c.matricula.includes(mat)) {
                const dif = c.kmsEntrada ? (c.kmsEntrada - c.kms) : '---';
                body.innerHTML += `<tr>
                    <td>${c.fechaSalida}</td><td>${c.matricula}</td><td>${c.nombre}</td>
                    <td>${c.asesor}</td><td>${dif} km</td><td>${c.estado}</td>
                </tr>`;
            }
        });
    }

    async function exportarExcel() {
        let csv = "Fecha;Matricula;Cliente;Asesor;Estado\n";
        historialGlobal.forEach(c => { csv += `${c.fechaSalida};${c.matricula};${c.nombre};${c.asesor};${c.estado}\n`; });
        const blob = new Blob([csv], {type:'text/csv'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Historial.csv";
        link.click();
    }
  </script>
</body>
</html>
