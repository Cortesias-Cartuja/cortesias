<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestión Total - Taller</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    body { background: #f0f2f5; }
    .admin-container { max-width: 1100px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    
    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { padding: 20px; border-radius: 8px; color: white; text-align: center; }
    .bg-blue { background: #002e63; }
    .bg-green { background: #28a745; }
    .bg-orange { background: #fd7e14; }
    
    .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-top: 30px; padding-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
    th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
    th { background: #f8f9fa; color: #333; }
    
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .disponible { background: #d4edda; color: #155724; }
    .prestado { background: #f8d7da; color: #721c24; }
    
    .btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
    .btn-red { background: #ff4d4d; color: white; }
    
    .scroll-table { overflow-x: auto; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>

<div class="admin-container">
  <div style="display:flex; justify-content: space-between; align-items:center;">
    <h1>📊 Panel de Gestión Total</h1>
    <a href="index.html" class="btn-tab active" style="text-decoration:none; max-width: 150px; text-align:center;">Volver al Formulario</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card bg-blue">
      <small>Total Flota</small>
      <h2 id="stat-total">0</h2>
    </div>
    <div class="stat-card bg-green">
      <small>Disponibles</small>
      <h2 id="stat-disp">0</h2>
    </div>
    <div class="stat-card bg-orange">
      <small>En Préstamo</small>
      <h2 id="stat-pres">0</h2>
    </div>
  </div>

  <div class="section-header">
    <h3>🚗 Gestión de Vehículos (Alta/Baja)</h3>
  </div>
  <div class="section" style="background: #f9f9f9;">
    <div class="grid-3">
      <input id="new-mat" placeholder="Matrícula">
      <input id="new-mod" placeholder="Marca / Modelo">
      <input id="new-kms" type="number" placeholder="KMs Iniciales">
    </div>
    <div class="grid-2" style="margin-top:10px;">
      <input id="new-comb" placeholder="Combustible (ej: 100%)">
      <button class="btn-main" onclick="agregarCoche()">AÑADIR NUEVO VEHÍCULO</button>
    </div>
  </div>

  <div class="scroll-table">
    <table>
      <thead>
        <tr>
          <th>Matrícula</th>
          <th>Modelo</th>
          <th>KMs Actuales</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="lista-vehiculos"></tbody>
    </table>
  </div>

  <div class="section-header">
    <h3>📋 Historial de Préstamos Recientes</h3>
  </div>
  <div class="scroll-table">
    <table>
      <thead>
        <tr>
          <th>Fecha Salida</th>
          <th>Vehículo</th>
          <th>Cliente</th>
          <th>Teléfono</th>
          <th>OR / ASPV</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="lista-contratos"></tbody>
    </table>
  </div>
</div>

<script>
  // --- CONFIGURACIÓN FIREBASE (PEGA TUS DATOS AQUÍ) ---
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Escuchar Vehículos
  db.ref('coches').on('value', (snapshot) => {
    const coches = snapshot.val() || {};
    renderVehiculos(coches);
    renderStats(coches);
  });

  // Escuchar Contratos (Historial)
  db.ref('contratos').limitToLast(20).on('value', (snapshot) => {
    const contratos = snapshot.val() || {};
    renderContratos(contratos);
  });

  function renderStats(coches) {
    const total = Object.keys(coches).length;
    const disp = Object.values(coches).filter(c => c.estado === 'Disponible').length;
    const pres = total - disp;
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-disp').innerText = disp;
    document.getElementById('stat-pres').innerText = pres;
  }

  function renderVehiculos(coches) {
    const lista = document.getElementById('lista-vehiculos');
    lista.innerHTML = "";
    Object.keys(coches).forEach(id => {
      const c = coches[id];
      lista.innerHTML += `
        <tr>
          <td><b>${c.matricula}</b></td>
          <td>${c.modelo}</td>
          <td>${c.kms}</td>
          <td><span class="status-badge ${c.estado.toLowerCase()}">${c.estado}</span></td>
          <td><button class="btn-action btn-red" onclick="eliminarCoche('${id}')">Eliminar</button></td>
        </tr>
      `;
    });
  }

  function renderContratos(contratos) {
    const lista = document.getElementById('lista-contratos');
    lista.innerHTML = "";
    // Invertir para ver el más reciente primero
    Object.values(contratos).reverse().forEach(c => {
      lista.innerHTML += `
        <tr>
          <td>${c.fechaSalida || '---'}</td>
          <td><b>${c.matricula}</b></td>
          <td>${c.nombre}</td>
          <td>${c.tel}</td>
          <td>${c.or}</td>
          <td><span class="status-badge" style="background:#eee">Finalizado/Activo</span></td>
        </tr>
      `;
    });
  }

  async function agregarCoche() {
    const mat = document.getElementById('new-mat').value.toUpperCase();
    const mod = document.getElementById('new-mod').value;
    const kms = document.getElementById('new-kms').value;
    const comb = document.getElementById('new-comb').value;
    if(!mat || !mod) return alert("Matrícula y Modelo obligatorios");

    await db.ref('coches').push({
      matricula: mat, modelo: mod, kms: kms, combustible: comb, estado: "Disponible"
    });
    document.getElementById('new-mat').value = "";
    document.getElementById('new-mod').value = "";
  }

  async function eliminarCoche(id) {
    if(confirm("¿Eliminar este vehículo permanentemente?")) {
      await db.ref('coches/' + id).remove();
    }
  }
</script>
</body>
</html>
