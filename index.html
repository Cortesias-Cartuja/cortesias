<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión de Cortesías</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="form-container">
    <div class="no-print header-nav">
      <div class="tabs">
        <button onclick="showTab('tab-salida')" class="btn-tab active" id="btn-sal">NUEVA SALIDA</button>
        <button onclick="showTab('tab-entrada')" class="btn-tab" id="btn-ent">RECOGIDA</button>
      </div>
      <a href="admin.html" class="btn-admin">⚙️ PANEL ADMIN</a>
    </div>

    <div class="header-img"><img src="https://i.imgur.com/NQH1nT0.png" style="width:100%"></div>

    <div id="contrato-imprimible">
      <div class="section">
        <h3>🚗 DATOS DEL VEHÍCULO Y ASESOR</h3>
        <div class="grid-4">
          <div><label>Matrícula Cortesia</label>
            <select id="p-veh-select" onchange="autoRellenarCoche()" class="no-print"><option value="">Seleccionar...</option></select>
            <input id="p-mat-print" class="only-print" readonly>
          </div>
          <div><label>Modelo</label><input id="p-mod" readonly></div>
          <div><label>Nº Orden (OR)</label><input id="p-or"></div>
          <div><label>Asesor</label><input id="p-asesor"></div>
        </div>
        <div class="grid-3" style="margin-top:5px; background:#f9f9f9; padding:5px; border-radius:4px;">
            <div><label>Cía Seguro Cortesia</label><input id="p-cia-fija" readonly></div>
            <div><label>Nº Póliza Cortesia</label><input id="p-pol-fija" readonly></div>
            <div><label>Tel. Asistencia</label><input id="p-tel-fija" readonly></div>
        </div>
      </div>

      <div class="section">
        <h3>👤 DATOS DEL CLIENTE</h3>
        <div class="grid-3">
          <div><label>Nombre y Apellidos</label><input id="p-nom"></div>
          <div><label>DNI / NIE</label><input id="p-dni"></div>
          <div><label>Teléfono Cliente</label><input id="p-tel"></div>
        </div>
        <div class="grid-3">
          <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
          <div><label>Código Postal</label><input id="p-cp"></div>
          <div><label>TARIFA</label>
            <select id="p-tarifa-select">
                <option value="GRATUITA">GRATUITA (Franquicia 300€)</option>
                <option value="REDUCIDA">REDUCIDA (15€/día)</option>
                <option value="ESTANDAR">ESTANDAR (30€/día)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid-2-col">
        <div class="sub-section">
          <h4>DATOS ENTREGA (SALIDA)</h4>
          <div class="data-row"><label>Fecha/Hora Salida:</label><input id="p-f-salida" readonly></div>
          <div class="data-row"><label>KMs Salida:</label><input id="p-kms"></div>
          <div class="data-row"><label>Combustible:</label><input id="p-comb"></div>
          <div class="data-row"><label>Observaciones:</label><textarea id="p-obs"></textarea></div>
          <div class="space-firma"><p>FIRMA ENTREGA</p></div>
        </div>
        <div class="sub-section">
          <h4>DATOS RECOGIDA (ENTRADA)</h4>
          <div class="data-row"><label>Fecha/Hora Entrada:</label><input id="d-f-entrada" readonly></div>
          <div class="data-row"><label>KMs Entrada:</label><input id="d-kms"></div>
          <div class="data-row"><label>Combustible Entrada:</label><input id="d-comb"></div>
          <div class="data-row"><label>Nuevos Daños:</label><textarea id="d-danos"></textarea></div>
          <div class="space-firma"><p>FIRMA RECOGIDA</p></div>
        </div>
      </div>
    </div>

    <div class="no-print">
        <div id="action-salida"><button class="btn-main" onclick="finalizarSalida()">💾 GUARDAR E IMPRIMIR SALIDA</button></div>
        <div id="action-entrada" style="display:none;">
            <select id="d-veh-select" onchange="verEstadoSalida()" style="margin:10px 0; border:2px solid #2563eb;"></select>
            <button class="btn-main" style="background:#2563eb;" onclick="finalizarEntrada()">✅ FINALIZAR Y IMPRIMIR RECOGIDA</button>
        </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
