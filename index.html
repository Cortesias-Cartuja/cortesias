<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Skoda</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="form-container">
        <div class="no-print" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <div class="tabs">
                <button onclick="cambiarPestana('salida')" id="btn-sal" class="btn-tab active">SALIDA</button>
                <button onclick="cambiarPestana('entrada')" id="btn-ent" class="btn-tab">ENTRADA</button>
            </div>
            <a href="admin.html" style="background:#1e3a8a; color:white; padding:10px; border-radius:5px; text-decoration:none;">⚙️ PANEL ADMIN</a>
        </div>

        <div class="header-img"><img src="https://i.imgur.com/NQH1nT0.png" style="max-width:200px;"></div>

        <div id="contrato">
            <div class="section">
                <h3>DATOS DEL VEHÍCULO</h3>
                <div class="grid-4">
                    <div>
                        <label>Matrícula</label>
                        <select id="sel-vehiculos" onchange="seleccionarCoche()"></select>
                    </div>
                    <div><label>Modelo</label><input id="p-mod" readonly></div>
                    <div><label>Nº OR</label><input id="p-or"></div>
                    <div><label>Asesor</label><select id="p-asesor"></select></div>
                </div>
            </div>

            <div class="section">
                <h3>DATOS DEL CLIENTE</h3>
                <div class="grid-3">
                    <div><label>Nombre</label><input id="p-nom"></div>
                    <div><label>DNI</label><input id="p-dni"></div>
                    <div><label>Teléfono</label><input id="p-tel"></div>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div style="width:80px;"><label>Vía</label><select id="p-via"><option>Cl.</option><option>Av.</option><option>Pz.</option></select></div>
                    <div style="flex-grow:1;"><label>Dirección</label><input id="p-dir"></div>
                </div>
                <div class="grid-3" style="margin-top:10px;">
                    <div><label>Carnet Exp.</label><input id="p-carnet-exp" type="date"></div>
                    <div><label>Carnet Cad.</label><input id="p-carnet-cad" type="date"></div>
                    <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="section">
                    <h4>SALIDA</h4>
                    <label>Fecha</label><input id="p-f-salida" readonly>
                    <label>KMs Salida</label><input id="p-kms" type="number">
                    <label>Combustible</label><input id="p-comb">
                    <label>Observaciones</label><textarea id="p-obs"></textarea>
                    <div class="space-firma"><p>FIRMA CLIENTE</p></div>
                </div>
                <div class="section">
                    <h4>ENTRADA</h4>
                    <label>Fecha</label><input id="d-f-entrada" readonly>
                    <label>KMs Entrada</label><input id="d-kms" type="number">
                    <label>Combustible</label><input id="d-comb-ent">
                    <label>Daños</label><textarea id="d-danos"></textarea>
                    <div class="space-firma"><p>FIRMA CLIENTE</p></div>
                </div>
            </div>
        </div>

        <div class="no-print">
            <button id="btn-accion" onclick="procesar()" style="width:100%; padding:15px; background:#10b981; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">GUARDAR E IMPRIMIR SALIDA</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
