<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acta de Préstamo y Devolución</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

  <div class="form-container">
    <div class="header-img">
      <img src="https://i.imgur.com/NQH1nT0.png" style="width:100%"> 
    </div>

    <div class="tabs no-print">
      <button onclick="showTab('tab-salida')" class="btn-tab active" id="btn-sal">NUEVA SALIDA</button>
      <button onclick="showTab('tab-entrada')" class="btn-tab" id="btn-ent">REGISTRAR DEVOLUCIÓN</button>
    </div>

    <div id="contrato-imprimible">
      
      <div class="section">
        <h3>🚗 DATOS DEL VEHÍCULO Y SERVICIO</h3>
        <div class="grid-3">
          <div><label>Vehículo (Matrícula)</label>
            <select id="p-veh-select" onchange="autoRellenarCoche()" class="no-print">
              <option value="">Seleccionar...</option>
            </select>
            <input id="p-mat-print" class="only-print" readonly> </div>
          <div><label>Modelo</label><input id="p-mod" readonly></div>
          <div><label>Nº Orden (OR)</label><input id="p-or"></div>
        </div>
      </div>

      <div class="section">
        <h3>👤 DATOS DEL CLIENTE</h3>
        <div class="grid-3">
          <div><label>Nombre Completo</label><input id="p-nom"></div>
          <div><label>DNI / NIE</label><input id="p-dni"></div>
          <div><label>Teléfono</label><input id="p-tel"></div>
        </div>
        <div class="grid-3">
          <div><label>C. Postal</label><input id="p-cp"></div>
          <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
          <div><label>Tarifa (€)</label><input id="p-tarifa"></div>
        </div>
      </div>

      <div class="grid-2-col">
        
        <div class="sub-section">
          <h4>DATOS DE ENTREGA (SALIDA)</h4>
          <div class="data-row"><label>Fecha Salida:</label><input id="p-f-salida" readonly></div>
          <div class="data-row"><label>KMs Salida:</label><input id="p-kms"></div>
          <div class="data-row"><label>Combustible:</label><input id="p-comb"></div>
          <div class="data-row"><label>Observaciones:</label><textarea id="p-obs"></textarea></div>
          <div class="space-firma">
            <p>Firma Cliente Entrega:</p>
          </div>
        </div>

        <div class="sub-section">
          <h4>DATOS DE RECOGIDA (ENTRADA)</h4>
          <div class="data-row"><label>Fecha Entrada:</label><input id="d-f-entrada" readonly></div>
          <div class="data-row"><label>KMs Entrada:</label><input id="d-kms"></div>
          <div class="data-row"><label>Combustible:</label><input id="d-comb"></div>
          <div class="data-row"><label>Nuevos Daños:</label><textarea id="d-danos"></textarea></div>
          <div class="space-firma">
            <p>Firma Cliente Recogida:</p>
          </div>
        </div>

      </div>
    </div>

    <div class="no-print">
        <button class="btn-main" id="btn-salida" onclick="finalizarSalida()">GRABAR E IMPRIMIR SALIDA</button>
        <div id="tab-entrada-actions" style="display:none">
            <label>Seleccionar Coche para Devolución:</label>
            <select id="d-veh-select" onchange="verEstadoSalida()"></select>
            <button class="btn-main" style="background:#0056b3;" onclick="finalizarEntrada()">REGISTRAR DEVOLUCIÓN</button>
        </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
