<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Cortesías Skoda</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="form-container">
    <div class="no-print header-nav">
      <div class="tabs">
        <button onclick="showTab('tab-salida')" class="btn-tab active" id="btn-sal">SALIDA</button>
        <button onclick="showTab('tab-entrada')" class="btn-tab" id="btn-ent">ENTRADA</button>
      </div>
      <a href="admin.html" style="text-decoration:none; padding:10px; background:#1e3a8a; color:white; border-radius:5px;">⚙️ ADMIN</a>
    </div>

    <div class="header-img"><img src="https://i.imgur.com/NQH1nT0.png"></div>

    <div id="contrato-imprimible">
      <div class="section">
        <h3>DATOS DEL VEHÍCULO Y SERVICIO</h3>
        <div class="grid-4">
          <div><label>Matrícula</label>
            <select id="p-veh-select" onchange="autoRellenarCoche()" class="no-print"></select>
            <input id="p-mat-print" class="only-print">
          </div>
          <div><label>Modelo</label><input id="p-mod" readonly></div>
          <div><label>Nº OR</label><input id="p-or"></div>
          <div><label>Asesor</label><select id="p-asesor-select"></select></div>
        </div>
      </div>

      <div class="section">
        <h3>DATOS DEL CLIENTE</h3>
        <div class="grid-3">
          <div><label>Nombre y Apellidos</label><input id="p-nom"></div>
          <div><label>DNI / NIE</label><input id="p-dni"></div>
          <div><label>Teléfono</label><input id="p-tel"></div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
          <div style="width: 100px;"><label>Vía</label>
            <select id="p-tipo-via">
              <option value="Cl.">Cl.</option><option value="Av.">Av.</option>
              <option value="Pz.">Pz.</option><option value="Crta.">Crta.</option>
            </select>
          </div>
          <div style="flex-grow: 1;"><label>Dirección</label><input id="p-dir"></div>
        </div>

        <div class="grid-3" style="margin-top:10px;">
          <div><label>Carnet Expedición</label><input id="p-carnet-exp" type="date"></div>
          <div><label>Carnet Caducidad</label><input id="p-carnet-cad" type="date"></div>
          <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
        </div>

        <div class="grid-3" style="margin-top:10px;">
          <div><label>C.P.</label><input id="p-cp"></div>
          <div><label>Devolución Prevista</label><input id="p-f-devolucion" type="date"></div>
          <div><label>Tarifa</label>
            <select id="p-tarifa-select">
              <option value="GRATUITA">GRATUITA (Franquicia 300€)</option>
              <option value="REDUCIDA">REDUCIDA (15€/día)</option>
              <option value="ESTANDAR">ESTANDAR (30€/día)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="grid-2-col">
        <div class="section">
          <h4>SALIDA</h4>
          <label>Fecha/Hora</label><input id="p-f-salida" readonly>
          <label>KMs Salida</label><input id="p-kms" type="number">
          <label>Combustible</label><input id="p-comb">
          <label>Observaciones</label><textarea id="p-obs" rows="2"></textarea>
          <div class="space-firma"><p>FIRMA CLIENTE (SALIDA)</p></div>
        </div>
        <div class="section">
          <h4>ENTRADA</h4>
          <label>Fecha/Hora</label><input id="d-f-entrada" readonly>
          <label>KMs Entrada</label><input id="d-kms" type="number">
          <label>Combustible</label><input id="d-comb-ent">
          <label>Daños/Notas</label><textarea id="d-danos" rows="2"></textarea>
          <div class="space-firma"><p>FIRMA CLIENTE (ENTRADA)</p></div>
        </div>
      </div>
    </div>

    <div class="no-print">
      <button onclick="finalizarSalida()" style="width:100%; padding:15px; background:#10b981; color:white; border:none; font-weight:bold; cursor:pointer;">GUARDAR E IMPRIMIR</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
