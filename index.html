<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión de Cortesías</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>
  <div class="form-container">
    <div class="no-print header-nav">
      <div class="tabs">
        <button onclick="showTab('tab-salida')" class="btn-tab active" id="btn-sal">NUEVA SALIDA</button>
        <button onclick="showTab('tab-entrada')" class="btn-tab" id="btn-ent">RECOGIDA / ENTRADA</button>
      </div>
      <a href="admin.html" class="btn-admin">⚙️ PANEL CONTROL</a>
    </div>

    <div class="header-img">
      <img src="https://i.imgur.com/NQH1nT0.png" style="width:100%" alt="Logo"> 
    </div>

    <div id="contrato-imprimible">
      <div class="section">
        <h3>🚗 VEHÍCULO DE CORTESÍA Y ASESOR</h3>
        <div class="grid-4">
          <div>
            <label>Matrícula Cortesía</label>
            <select id="p-veh-select" onchange="autoRellenarCoche()" class="no-print"></select>
            <input id="p-mat-print" class="only-print" readonly>
          </div>
          <div><label>Modelo</label><input id="p-mod" readonly></div>
          <div><label>Nº Orden (OR)</label><input id="p-or"></div>
          <div>
            <label>Asesor</label>
            <select id="p-asesor-select"></select>
          </div>
        </div>
        <div class="grid-3" style="background:#f1f5f9; padding:10px; border-radius:5px; margin-top:5px;">
            <div><label>Cía Seguro</label><input id="p-cia-fija" readonly></div>
            <div><label>Póliza</label><input id="p-pol-fija" readonly></div>
            <div><label>Asistencia</label><input id="p-tel-fija" readonly></div>
        </div>
      </div>

      <div class="section">
        <h3>👤 DATOS DEL CLIENTE</h3>
        <div class="grid-3">
          <div><label>Nombre y Apellidos</label><input id="p-nom"></div>
          <div><label>DNI / NIE</label><input id="p-dni"></div>
          <div><label>Teléfono Cliente</label><input id="p-tel" type="number"></div>
        </div>
        <div class="grid-3">
          <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
          <div><label>Código Postal</label><input id="p-cp"></div>
          <div><label>Fecha Devolución Prevista</label><input id="p-f-devolucion" type="date"></div>
        </div>
        <div class="grid-1" style="margin-top:10px;">
            <label>TARIFAS Y CARGOS</label>
            <select id="p-tarifa-select" style="border: 2px solid #1e3a8a; font-weight: bold;">
                <option value="GRATUITA">GRATUITA (Franquicia 300€)</option>
                <option value="REDUCIDA">REDUCIDA (15€/día)</option>
                <option value="ESTANDAR">ESTANDAR (30€/día)</option>
            </select>
        </div>
      </div>

      <div class="grid-2-col">
        <div class="sub-section">
          <h4>ESTADO EN LA ENTREGA</h4>
          <div class="data-row"><label>Fecha Salida:</label><input id="p-f-salida" readonly></div>
          <div class="data-row"><label>KMs Salida:</label><input id="p-kms" type="number"></div>
          <div class="data-row"><label>Combustible:</label><input id="p-comb"></div>
          <div class="data-row"><label>Observaciones:</label><textarea id="p-obs"></textarea></div>
          <div class="space-firma"><p>FIRMA ENTREGA</p></div>
        </div>

        <div class="sub-section">
          <h4>ESTADO EN LA RECOGIDA</h4>
          <div class="data-row"><label>Fecha Entrada:</label><input id="d-f-entrada" readonly></div>
          <div class="data-row"><label>KMs Entrada:</label><input id="d-kms" type="number"></div>
          <div class="data-row"><label>Combustible Entrada:</label><input id="d-comb-ent"></div>
          <div class="data-row"><label>Nuevos Daños:</label><textarea id="d-danos"></textarea></div>
          <div class="space-firma"><p>FIRMA RECOGIDA</p></div>
        </div>
      </div>
    </div>

    <div class="no-print">
      <div id="action-salida">
        <button class="btn-main" onclick="finalizarSalida()">💾 GRABAR E IMPRIMIR SALIDA</button>
      </div>
      <div id="action-entrada" style="display:none;">
        <div style="background:#eff6ff; padding:15px; border-radius:8px; border:1px solid #2563eb; margin-bottom:10px;">
            <label style="font-weight:bold;">SELECCIONA COCHE A RECOGER:</label>
            <select id="d-veh-select" onchange="verEstadoSalida()"></select>
        </div>
        <button class="btn-main" style="background:#2563eb;" onclick="finalizarEntrada()">✅ FINALIZAR Y IMPRIMIR RECOGIDA</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
