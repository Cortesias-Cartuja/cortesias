<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Flota - Taller</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  
  <style>
    /* Estilos específicos de pantalla */
    #signature-pad {
      border: 2px dashed #ccc;
      border-radius: 8px;
      cursor: crosshair;
      background: #f9f9f9;
      width: 100%;
      height: 180px; /* Reducido un poco para ganar espacio */
      touch-action: none;
    }
    .signature-container { margin-top: 10px; text-align: center; }
    .btn-clear { background: #6c757d; color: white; border: none; padding: 5px 10px; border-radius: 4px; margin-top: 5px; cursor: pointer; }
    
    #comparativa-salida {
      display: none;
      background: #eef4ff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #b6c9f0;
    }

    /* --- SOLUCIÓN DE IMPRESIÓN (UNA SOLA HOJA) --- */
    @media print {
      @page { size: A4; margin: 0.5cm; } /* Margen mínimo */
      
      body { background: white; padding: 0; margin: 0; }
      .form-container { max-width: 100%; margin: 0; padding: 0; box-shadow: none; border: none; }
      
      /* Ocultamos navegación y botones */
      .tabs, .btn-main, .btn-clear, a, .upload-info, #upload-status {
        display: none !important;
        visibility: hidden !important;
      }

      /* Ajustamos secciones para que quepan */
      .section {
        padding: 8px !important;
        margin-bottom: 5px !important;
        border: 1px solid #eee !important;
      }

      h3 { font-size: 12px !important; margin: 5px 0 !important; }

      /* Reducimos firma en papel */
      #signature-pad {
        height: 100px !important; 
        border: 1px solid #000 !important;
      }

      /* Compactamos inputs */
      input, select, textarea {
        font-size: 11px !important;
        padding: 2px !important;
        border: none !important;
        background: transparent !important;
      }

      label { font-size: 9px !important; margin-bottom: 1px !important; }
      
      /* Forzamos cuadrículas a no romperse */
      .grid-3, .grid-2 {
        display: flex !important;
        gap: 10px !important;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div style="text-align: right; padding-bottom: 10px;" class="no-print">
      <a href="admin.html" style="font-size: 12px; color: #666; text-decoration: none; border: 1px solid #ccc; padding: 4px 8px; border-radius: 4px;">⚙️ Acceso Admin</a>
    </div>
    
    <div class="header-img">
      <img src="https://i.imgur.com/NQH1nT0.png" style="width:100%; max-height: 80px; object-fit: contain;" alt="Logo Taller"> 
    </div>

    <div class="tabs no-print">
      <button onclick="showTab('tab-salida')" class="btn-tab active" id="btn-sal">SALIDA (Préstamo)</button>
      <button onclick="showTab('tab-entrada')" class="btn-tab" id="btn-ent">ENTRADA (Devolución)</button>
    </div>

    <div id="tab-salida">
      <div class="section">
        <h3>🚗 DATOS DEL VEHÍCULO DE CORTESÍA</h3>
        <div class="grid-3">
          <div>
            <label>Vehículo (Matrícula)</label>
            <select id="p-veh-select" onchange="autoRellenarCoche()">
              <option value="">Cargando stock...</option>
            </select>
          </div>
          <div><label>Modelo</label><input id="p-mod" readonly></div>
          <div><label>KMs Salida</label><input id="p-kms" type="number"></div>
        </div>
        <div class="grid-3">
          <div><label>Combustible</label><input id="p-comb"></div>
          <div><label>Matrícula Cliente</label><input id="p-mat-c"></div>
          <div><label>Nº Orden / ASPV</label><input id="p-or"></div>
        </div>
        <div class="grid-3">
          <div>
            <label>Motivo</label>
            <select id="p-motivo">
              <option value="Avería">Avería</option>
              <option value="Mantenimiento">Mantenimiento</option>
              <option value="Chapa">Chapa</option>
              <option value="Garantía">Garantía</option>
            </select>
          </div>
          <div><label>Tarifa (€)</label><input id="p-tarifa"></div>
          <div><label>CP Cliente</label><input id="p-cp"></div>
        </div>
      </div>

      <div class="section">
        <h3>👤 DATOS DEL CONDUCTOR</h3>
        <div class="grid-2">
          <div><label>Nombre y Apellidos</label><input id="p-nom"></div>
          <div><label>DNI / NIE</label><input id="p-dni"></div>
        </div>
        <div class="grid-2">
          <div><label>Teléfono</label><input id="p-tel"></div>
          <div><label>F. Nacimiento</label><input id="p-fnac" type="date"></div>
        </div>
        <div class="grid-3">
          <div><label>Exp. Carnet</label><input id="p-fcarnet" type="date"></div>
          <div><label>Caducidad</label><input id="p-fcad" type="date"></div>
          <div><label>F. Aprox. Dev</label><input id="p-faprox" type="date"></div>
        </div>
        
        <div class="signature-container">
          <label style="display:block; margin-bottom:2px; text-align:left; font-weight:bold;">✍️ Firma del Cliente</label>
          <canvas id="signature-pad"></canvas>
          <button type="button" class="btn-clear no-print" onclick="clearSignature()">Borrar y repetir firma</button>
        </div>

        <textarea id="p-obs" placeholder="Otras observaciones..." style="width:100%; margin-top:10px; height:40px;"></textarea>
      </div>

      <button class="btn-main no-print" id="btn-salida" onclick="finalizarSalida()">💾 GRABAR E IMPRIMIR CONTRATO</button>
      <div id="upload-status" class="upload-info" style="display:none;">⏳ Guardando datos y firma...</div>
    </div>

    <div id="tab-entrada" style="display:none">
      <div class="section">
        <h3>🏁 RECEPCIÓN DE VEHÍCULO</h3>
        <label>Seleccionar coche devuelto</label>
        <select id="d-veh-select" onchange="verEstadoSalida()" style="font-size:18px; height:45px; margin-bottom:15px;"></select>
        
        <div id="comparativa-salida"></div>

        <div class="grid-2">
          <div><label>KMs Entrada</label><input id="d-kms" type="number"></div>
          <div><label>Combustible Entrada</label><input id="d-comb"></div>
        </div>
        
        <textarea id="d-danos" placeholder="Notas de nuevos daños..." style="width:100%; height:60px; margin-top:10px;"></textarea>
        
        <button class="btn-main" style="background:#0056b3; margin-top:20px;" onclick="finalizarEntrada()">REGISTRAR DEVOLUCIÓN Y LIBERAR</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
